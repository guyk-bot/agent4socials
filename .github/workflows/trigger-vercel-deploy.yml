# On every push to main, trigger Vercel deploy via deploy hook so the site redeploys regardless of commit author.
name: Trigger Vercel deploy
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deployment
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}" ]; then
            curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
            echo "Vercel deploy triggered."
          else
            echo "VERCEL_DEPLOY_HOOK_URL not set. Add it in GitHub repo Settings → Secrets and variables → Actions to trigger deploys on push."
          fi
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
